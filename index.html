<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JS-GO: Single File Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Courier New', Courier, monospace; }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #0f0;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            z-index: 10;
        }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            border: 2px solid #0f0;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 2px solid #0f0;
        }
    </style>
</head>
<body>

    <div id="ui">MUNICIÇÃO: <span id="ammo">30</span> / 90</div>
    <div id="crosshair"></div>
    <div id="instructions">
        <h1>JS-GO</h1>
        <p>CLIQUE PARA COMEÇAR</p>
        <p>(W,A,S,D para mover | MOUSE para olhar | CLIQUE para atirar)</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // --- CONFIGURAÇÃO INICIAL ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.Fog(0x111122, 0, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ILUMINAÇÃO ---
        const light = new THREE.HemisphereLight(0xeeeeff, 0x444422, 1);
        scene.add(light);

        // --- O JOGADOR (CÂMERA + ARMA) ---
        const player = new THREE.Group();
        player.add(camera);
        scene.add(player);
        player.position.y = 1.6;

        // Criando uma "Arma" simples (Cubo alongado)
        const weaponGeo = new THREE.BoxGeometry(0.1, 0.1, 0.5);
        const weaponMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const weapon = new THREE.Mesh(weaponGeo, weaponMat);
        weapon.position.set(0.3, -0.2, -0.5); // Posição na mão direita
        camera.add(weapon);

        // --- MAPA (CHÃO E PAREDES) ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Adicionar alguns "Inimigos" (Alvos)
        const targets = [];
        for(let i=0; i<10; i++) {
            const targetGeo = new THREE.BoxGeometry(1, 2, 1);
            const targetMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const target = new THREE.Mesh(targetGeo, targetMat);
            target.position.set(Math.random()*40-20, 1, Math.random()*40-20);
            scene.add(target);
            targets.push(target);
        }

        // --- LÓGICA DE CONTROLES ---
        const menu = document.getElementById('instructions');
        menu.addEventListener('click', () => document.body.requestPointerLock());

        document.addEventListener('pointerlockchange', () => {
            menu.style.display = document.pointerLockElement ? 'none' : 'block';
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                player.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- SISTEMA DE TIRO ---
        const raycaster = new THREE.Raycaster();
        let ammo = 30;

        window.addEventListener('mousedown', () => {
            if (document.pointerLockElement && ammo > 0) {
                ammo--;
                document.getElementById('ammo').innerText = ammo;

                // Efeito de coice da arma
                weapon.position.z = -0.4;
                setTimeout(() => weapon.position.z = -0.5, 50);

                // Verificar colisão do tiro
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                raycaster.set(camera.getWorldPosition(new THREE.Vector3()), direction);

                const intersects = raycaster.intersectObjects(targets);
                if (intersects.length > 0) {
                    const hit = intersects[0].object;
                    hit.material.color.set(0xffffff); // Pisca ao acertar
                    setTimeout(() => {
                        hit.position.y = -5; // "Elimina" o alvo jogando-o para baixo
                    }, 100);
                }
            }
        });

        // --- LOOP DE ANIMAÇÃO ---
        function animate() {
            requestAnimationFrame(animate);

            if (document.pointerLockElement) {
                const speed = 0.12;
                if (keys['KeyW']) player.translateZ(-speed);
                if (keys['KeyS']) player.translateZ(speed);
                if (keys['KeyA']) player.translateX(-speed);
                if (keys['KeyD']) player.translateX(speed);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
